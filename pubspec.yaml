name: flutter_meta_wearables_dat_example
description: "Demonstrates how to use the flutter_meta_wearables_dat plugin."
version: 0.0.1+1
publish_to: 'none'

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter

  flutter_meta_wearables_dat: ^0.5.2
  flutter_meta_wearables_dat_mock_device: ^0.5.2

  cupertino_icons: ^1.0.8
  provider: ^6.1.1
  image_picker: ^1.2.0
  file_picker: ^8.1.4
  app_links: ^6.3.4
  share_plus: ^12.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^5.0.0
  very_good_analysis: ^10.0.0


flutter:

  uses-material-design: true

  assets:
    - assets/images/cameraAccessIcon.png